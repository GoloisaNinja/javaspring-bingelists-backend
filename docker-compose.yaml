version: "3.8"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bingelist-application
    container_name: bingelist-application
    restart: on-failure
    depends_on:
      - mongodb
    ports:
      - "63800:8080"
    environment:
      - TMDB_APIKEY=${TMDB_APIKEY}
      - JWT_SECRET=${JWT_SECRET}
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
        - "27017:27017"
    volumes:
        - data:/java-mpbackend
  mongo-express:
      image: mongo-express
      container_name: mongo-express
      restart: always
      ports:
        - "8081:8081"
      environment:
        - ME_CONFIG_MONGODB_SERVER=mongodb
volumes:
      data: {}

networks:
      default:
          name: mongodb network